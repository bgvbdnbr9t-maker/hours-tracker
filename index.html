  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hours Tracker</title>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#121212">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <h1>Hours Tracker</h1>

  <!-- INPUT CARD -->
  <div class="card">
    <input type="number" id="hours" placeholder="Hours worked">
    <input type="number" id="rate" placeholder="Hourly rate">
    <button onclick="calculatePay()">Add Shift</button>
  </div>

  <!-- TOTALS -->
  <div class="card totals">
    <p id="today">Today: $0</p>
    <p id="weekly">This Week: $0</p>
    <p id="total">Total: $0</p>
  </div>

  <!-- CHART -->
  <div class="card">
    <canvas id="chart"></canvas>
  </div>

  <!-- ACTIONS -->
  <div class="card actions">
    <button onclick="resetData()">Reset</button>
    <button onclick="exportCSV()">Export</button>
    <button onclick="toggleDarkMode()">Dark Mode</button>
    <button onclick="backupData()">Backup</button>
    <button onclick="restoreData()">Restore</button>
  </div>

  <!-- HISTORY -->
  <h2>History</h2>
  <div id="history"></div>

  <!-- SCRIPT -->
  <script src="script.js"></script>

</body>
</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
