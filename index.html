<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Work tracker</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="container">
  <h2>💼 Work Tracker</h2>

  <div class="card">
    <input type="number" id="hours" placeholder="Hours worked">
    <input type="number" id="rate" placeholder="Hourly rate">
    <button onclick="calculatePay()">Add Entry</button>
  </div>

  <div class="stats">
    <h3 id="today"></h3>
    <h3 id="weekly"></h3>
    <h3 id="total"></h3>
  </div>

  <div class="actions">
    <button onclick="resetData()" class="reset">Reset</button>
    <button onclick="exportCSV()" class="export">Export CSV</button>
    <button onclick="toggleDarkMode()" class="dark">Dark Mode</button>
    <button onclick="backupData()">Backup</button>
    <button onclick="restoreData()">Restore</button>
  </div>

  <canvas id="chart" height="200"></canvas>

  <h3>📜 History</h3>
  <div id="history"></div>
</div>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>
    <script  src="./script.js"></script>

  </body>
  
</html>
